<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация · Сигналы галактики</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.1s ease;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #c0e8d5 0%, #a3d0e0 100%);
            padding: 1rem;
            position: relative;
        }

        /* тёмная тема (класс переключается на body) */
        body.dark-theme {
            background: linear-gradient(145deg, #163832 0%, #1c4b5e 100%);
        }

        body.dark-theme .login-card {
            background: rgba(18, 35, 38, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid #2b686e;
            box-shadow: 0 20px 40px -12px rgba(0, 20, 10, 0.8);
        }

        body.dark-theme .welcome-title {
            color: #c6f7f0;
        }

        body.dark-theme .input-field {
            background: rgba(25, 50, 45, 0.7);
            border-color: #2d7a7a;
            color: #e0f0ec;
        }

        body.dark-theme .input-field::placeholder {
            color: #7aa9b0;
        }

        body.dark-theme .input-icon svg {
            stroke: #6fc2b0;
        }

        body.dark-theme .login-btn {
            background: #1f6e6b;
            color: #def3f0;
            box-shadow: 0 4px 10px rgba(13, 75, 70, 0.5);
        }

        body.dark-theme .login-btn:hover {
            background: #25807c;
        }

        body.dark-theme .link-login {
            color: #9edfd2;
        }

        body.dark-theme .link-login:hover {
            color: #c6f7e5;
        }

        body.dark-theme .theme-switch {
            background: #204e55;
            border-color: #359980;
            color: #b8e6da;
        }

        body.dark-theme .fio-bottom {
            color: #b0e3da;
            background: rgba(26, 68, 65, 0.6);
            border-color: #358078;
        }

        /* основной контейнер — чуть шире для пяти полей */
        .login-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(14px);
            width: 100%;
            max-width: 520px;
            border-radius: 48px 48px 40px 40px;
            padding: 2.5rem 2rem 1.8rem 2rem;
            box-shadow: 0 30px 50px -20px rgba(18, 67, 68, 0.5);
            border: 1px solid rgba(80, 150, 140, 0.35);
            position: relative;
            margin: 2rem 0;
        }

        /* переключатель темы — правый верхний угол карточки */
        .theme-switch {
            position: absolute;
            top: 18px;
            right: 24px;
            background: #d9f0e9;
            border: 1px solid #2f8279;
            border-radius: 60px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #034b44;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(27, 94, 85, 0.15);
            transition: all 0.15s;
            z-index: 10;
        }

        .theme-switch:hover {
            background: #bee9e2;
            transform: scale(1.02);
        }

        .theme-switch svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
        }

        /* Левый нижний угол карточки — теперь здесь ссылка на вход */
        .login-link-corner {
            position: absolute;
            bottom: 20px;
            left: 28px;
            font-size: 1rem;
            font-weight: 500;
            z-index: 5;
        }

        .link-login {
            color: #03584e;
            text-decoration: none;
            background: rgba(90, 160, 150, 0.2);
            padding: 6px 14px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(45, 110, 100, 0.25);
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .link-login:hover {
            background: rgba(60, 140, 130, 0.35);
            border-color: #227a6b;
            transform: scale(1.02);
        }

        .link-login svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
        }

        /* центральный контент */
        .welcome-wrapper {
            text-align: center;
            margin-bottom: 1.8rem;
            margin-top: 0.8rem;
        }

        .welcome-title {
            font-size: 2rem;
            font-weight: 600;
            color: #043b3b;
            margin-bottom: 0.2rem;
            text-shadow: 0 2px 5px rgba(255, 255, 255, 0.4);
        }

        .welcome-sub {
            font-size: 0.95rem;
            color: #1d645a;
            font-weight: 400;
            letter-spacing: 0.03em;
        }

        /* форма */
        .input-group {
            margin-bottom: 1.3rem;
            position: relative;
        }

        .input-label {
            display: block;
            text-align: left;
            margin-bottom: 4px;
            margin-left: 12px;
            font-weight: 500;
            color: #0b5b54;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }

        .input-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            border: 2px solid #43978b;
            border-radius: 48px;
            padding: 14px 24px 14px 52px;
            font-size: 1rem;
            outline: none;
            color: #03352f;
            font-weight: 400;
            transition: 0.15s;
        }

        .input-field:focus {
            border-color: #1a7c6e;
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 0 0 4px rgba(36, 147, 128, 0.15);
        }

        .input-icon {
            position: absolute;
            left: 20px;
            bottom: 12px;
            pointer-events: none;
        }

        .input-icon svg {
            width: 22px;
            height: 22px;
            stroke: #146b60;
            stroke-width: 1.8;
        }

        .login-btn {
            width: 100%;
            background: #1b8375;
            border: none;
            border-radius: 60px;
            padding: 15px 24px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #ecfff9;
            margin-top: 1rem;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(22, 110, 90, 0.4);
            transition: all 0.2s;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .login-btn:hover {
            background: #0f6e62;
            transform: translateY(-2px);
            box-shadow: 0 14px 22px -6px #165a52;
        }

        .login-btn:active {
            transform: scale(0.98);
            background: #0a5a50;
        }

        /* блок ссылок под кнопкой */
        .extra-links {
            display: flex;
            justify-content: space-between;
            margin-top: 1.2rem;
            font-size: 0.9rem;
            color: #226057;
        }

        .extra-links span {
            opacity: 0.75;
            font-style: italic;
        }

        /* ФИО в самом низу страницы (под карточкой) */
        .fio-bottom {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
            font-weight: 450;
            color: #05332e;
            background: rgba(90, 160, 150, 0.3);
            backdrop-filter: blur(8px);
            padding: 6px 24px;
            border-radius: 60px;
            border: 1px solid rgba(45, 110, 100, 0.4);
            letter-spacing: 0.5px;
            white-space: nowrap;
            z-index: 20;
            box-shadow: 0 4px 10px rgba(0, 30, 20, 0.1);
        }

        /* компактность для 5 полей */
        @media (max-width: 500px) {
            .login-card { padding: 2rem 1.2rem; }
            .welcome-title { font-size: 1.8rem; }
            .login-link-corner { left: 16px; }
            .fio-bottom { font-size: 0.9rem; padding: 4px 16px; }
            .input-field { padding: 12px 18px 12px 48px; font-size: 0.95rem; }
            .input-icon { bottom: 10px; left: 16px; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <!-- Переключатель темы в правом верхнем углу -->
        <div class="theme-switch" id="themeToggle">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="5" stroke="currentColor" fill="none" />
                <line x1="12" y1="2" x2="12" y2="4" stroke="currentColor" />
                <line x1="12" y1="20" x2="12" y2="22" stroke="currentColor" />
                <line x1="4" y1="4" x2="6" y2="6" stroke="currentColor" />
                <line x1="18" y1="18" x2="20" y2="20" stroke="currentColor" />
                <line x1="2" y1="12" x2="4" y2="12" stroke="currentColor" />
                <line x1="20" y1="12" x2="22" y2="12" stroke="currentColor" />
                <line x1="4" y1="20" x2="6" y2="18" stroke="currentColor" />
                <line x1="18" y1="6" x2="20" y2="4" stroke="currentColor" />
            </svg>
            <span id="themeText">Светлая</span>
        </div>

        <!-- Левый нижний угол карточки: гиперссылка "Вход" -->
        <div class="login-link-corner">
            <a href="#" class="link-login" onclick="alert('Переход ко входу (демо)')">
                <svg viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M5 20v-2a7 7 0 0 1 14 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="15" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="18" y1="9" x2="21" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="18" y1="15" x2="21" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                Вход
            </a>
        </div>

        <!-- Центральная надпись "добро пожаловать" -->
        <div class="welcome-wrapper">
            <div class="welcome-title">добро пожаловать</div>
            <div class="welcome-sub">создание нового аккаунта</div>
        </div>

        <!-- Форма регистрации с пятью полями -->
        <form id="registerForm" onsubmit="event.preventDefault(); alert('Регистрация (демо): данные не отправляются');">
            <!-- Имя -->
            <div class="input-group">
                <div class="input-label">Имя</div>
                <input class="input-field" type="text" placeholder="введите имя" id="firstname" autocomplete="given-name">
                <span class="input-icon">
                    <svg viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M5 20v-2a7 7 0 0 1 14 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </span>
            </div>

            <!-- Фамилия -->
            <div class="input-group">
                <div class="input-label">Фамилия</div>
                <input class="input-field" type="text" placeholder="введите фамилию" id="lastname" autocomplete="family-name">
                <span class="input-icon">
                    <svg viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M5 20v-2a7 7 0 0 1 14 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </span>
            </div>

            <!-- Логин -->
            <div class="input-group">
                <div class="input-label">Логин</div>
                <input class="input-field" type="text" placeholder="придумайте логин" id="username" autocomplete="username">
                <span class="input-icon">
                    <svg viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M5 20v-2a7 7 0 0 1 14 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </span>
            </div>

            <!-- Пароль -->
            <div class="input-group">
                <div class="input-label">Пароль</div>
                <input class="input-field" type="password" placeholder="минимум 6 символов" id="password" autocomplete="new-password">
                <span class="input-icon">
                    <svg viewBox="0 0 24 24" fill="none">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </span>
            </div>

            <!-- Подтверждение пароля -->
            <div class="input-group">
                <div class="input-label">Подтверждение пароля</div>
                <input class="input-field" type="password" placeholder="повторите пароль" id="confirm-password" autocomplete="off">
                <span class="input-icon">
                    <svg viewBox="0 0 24 24" fill="none">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </span>
            </div>

            <button class="login-btn" type="submit">зарегистрироваться</button>

            <div class="extra-links">
                <span></span>
                <span>🌐 галактическая сеть</span>
            </div>
        </form>
    </div>

    <!-- ФИО в самом низу страницы (за пределами карточки) -->
    <div class="fio-bottom">
            Горин Д В, Гусев М А
    </div>

    <script>
        (function() {
            const themeToggle = document.getElementById('themeToggle');
            const themeText = document.getElementById('themeText');
            const body = document.body;

            // проверяем сохранённую тему в localStorage
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                body.classList.add('dark-theme');
                themeText.innerText = 'Тёмная';
            } else {
                themeText.innerText = 'Светлая';
            }

            // функция переключения темы
            function switchTheme() {
                if (body.classList.contains('dark-theme')) {
                    body.classList.remove('dark-theme');
                    themeText.innerText = 'Светлая';
                    localStorage.setItem('theme', 'light');
                } else {
                    body.classList.add('dark-theme');
                    themeText.innerText = 'Тёмная';
                    localStorage.setItem('theme', 'dark');
                }
            }

            themeToggle.addEventListener('click', switchTheme);

            // анимация полей
            const inputs = document.querySelectorAll('.input-field');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.style.transform = 'scale(1.01)';
                });
                input.addEventListener('blur', () => {
                    input.parentElement.style.transform = 'scale(1)';
                });
            });

            // простая проверка совпадения паролей при отправке (демо-режим)
            const form = document.getElementById('registerForm');
            const password = document.getElementById('password');
            const confirm = document.getElementById('confirm-password');

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                if (password.value !== confirm.value) {
                    alert('❌ Пароли не совпадают!');
                } else if (password.value.length > 0 && password.value.length < 6) {
                    alert('❌ Пароль должен быть не менее 6 символов');
                } else {
                    alert('✅ Регистрация прошла успешно (демо-режим)');
                }
            });
        })();
    </script>
</body>
</html>
