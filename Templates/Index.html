<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная · Навигатор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffe6f0 0%, #ffe0ec 30%, #f0e6ff 100%);
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* тёмная тема (розово-синяя) */
        body.dark-theme {
            background: linear-gradient(145deg, #33202a 0%, #442a38 40%, #1f2a3a 100%);
        }

        body.dark-theme .main-card {
            background: rgba(35, 25, 35, 0.85);
            border-color: #b36695;
        }

        body.dark-theme .nav-button {
            background: #332a38;
            border-color: #cc7aa8;
            color: #f5d0e5;
        }

        body.dark-theme .nav-button:hover {
            background: #553a50;
        }

        body.dark-theme .theme-switch {
            background: #332a38;
            border-color: #e09ec6;
            color: #f5d0e5;
        }

        body.dark-theme .footer-info {
            background: rgba(55, 35, 50, 0.7);
            border-color: #b36695;
            color: #f2cce2;
        }

        .main-card {
            background: rgba(255, 245, 250, 0.6);
            backdrop-filter: blur(12px);
            width: 100%;
            max-width: 1000px;
            border-radius: 48px;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 40px -10px rgba(180, 100, 140, 0.2);
            border: 1px solid rgba(230, 150, 190, 0.4);
            position: relative;
        }

        /* переключатель темы — справа сверху */
        .theme-switch {
            position: absolute;
            top: 24px;
            right: 28px;
            background: #ffffff;
            border: 1px solid #f2aac0;
            border-radius: 60px;
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #b34d7a;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(200, 100, 150, 0.15);
        }

        .theme-switch:hover {
            background: #ffe6f0;
        }

        .theme-switch svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        /* заголовок */
        .welcome-section {
            text-align: center;
            margin-bottom: 3rem;
            margin-top: 1rem;
        }

        .welcome-title {
            font-size: 2.2rem;
            font-weight: 500;
            background: linear-gradient(135deg, #b34d7a, #8a6fc9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .welcome-sub {
            font-size: 1rem;
            color: #a65d82;
            opacity: 0.8;
            margin-top: 0.3rem;
        }

        /* сетка навигационных карточек */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.8rem;
            margin: 2.5rem 0;
        }

        .nav-button {
            background: #ffffff;
            border: 1px solid #f5b8d0;
            border-radius: 32px;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #ac4f7a;
            box-shadow: 0 4px 10px rgba(200, 120, 160, 0.1);
            backdrop-filter: blur(4px);
        }

        .nav-button:hover {
            background: #ffe3f0;
            transform: translateY(-3px);
            border-color: #e68ab0;
            box-shadow: 0 12px 20px -8px rgba(200, 100, 150, 0.25);
        }

        .nav-icon {
            width: 48px;
            height: 48px;
            stroke: currentColor;
            stroke-width: 1.8;
            fill: none;
            margin-bottom: 1rem;
        }

        .nav-label {
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 0.3rem;
        }

        .nav-desc {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* дополнительная информация об авторах — миниблок внизу */
        .footer-info {
            background: rgba(255, 235, 245, 0.6);
            backdrop-filter: blur(4px);
            border: 1px solid #f5b8d0;
            border-radius: 60px;
            padding: 0.7rem 2rem;
            text-align: center;
            color: #ac4f7a;
            font-size: 0.9rem;
            width: fit-content;
            margin: 1.5rem auto 0 auto;
        }

        /* адаптив */
        @media (max-width: 700px) {
            .nav-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .main-card {
                padding: 2rem 1.2rem;
            }
            .welcome-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="main-card">
        <!-- Переключатель темы (правый верхний угол) -->
        <div class="theme-switch" id="themeToggle">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="5" stroke="currentColor" fill="none" />
                <line x1="12" y1="2" x2="12" y2="4" stroke="currentColor" />
                <line x1="12" y1="20" x2="12" y2="22" stroke="currentColor" />
                <line x1="4" y1="4" x2="6" y2="6" stroke="currentColor" />
                <line x1="18" y1="18" x2="20" y2="20" stroke="currentColor" />
                <line x1="2" y1="12" x2="4" y2="12" stroke="currentColor" />
                <line x1="20" y1="12" x2="22" y2="12" stroke="currentColor" />
                <line x1="4" y1="20" x2="6" y2="18" stroke="currentColor" />
                <line x1="18" y1="6" x2="20" y2="4" stroke="currentColor" />
            </svg>
            <span id="themeText">Светлая</span>
        </div>

        <!-- Приветствие -->
        <div class="welcome-section">
            <div class="welcome-title">галактическая сеть</div>
            <div class="welcome-sub">классификация сигналов · навигация</div>
        </div>

        <!-- Три навигационные кнопки на основные разделы -->
        <div class="nav-grid">
            <!-- Кнопка "Аккаунт" -->
            <div class="nav-button" onclick="window.location.href='account.html'">
                <svg class="nav-icon" viewBox="0 0 24 24">
                    <circle cx="12" cy="8" r="4" stroke="currentColor" fill="none"/>
                    <path d="M5 20v-2a7 7 0 0 1 14 0v2" stroke="currentColor" fill="none"/>
                </svg>
                <div class="nav-label">Аккаунт</div>
                <div class="nav-desc">профиль и настройки</div>
            </div>

            <!-- Кнопка "Графики и аналитика" -->
            <div class="nav-button" onclick="window.location.href='charts.html'">
                <svg class="nav-icon" viewBox="0 0 24 24">
                    <line x1="18" y1="20" x2="18" y2="10" stroke="currentColor" stroke-linecap="round"/>
                    <line x1="12" y1="20" x2="12" y2="4" stroke="currentColor" stroke-linecap="round"/>
                    <line x1="6" y1="20" x2="6" y2="14" stroke="currentColor" stroke-linecap="round"/>
                </svg>
                <div class="nav-label">Графики</div>
                <div class="nav-desc">аналитика и метрики</div>
            </div>

            <!-- Кнопка "Загрузка данных" -->
            <div class="nav-button" onclick="window.location.href='upload.html'">
                <svg class="nav-icon" viewBox="0 0 24 24">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" fill="none"/>
                    <polyline points="17 8 12 3 7 8" stroke="currentColor" fill="none"/>
                    <line x1="12" y1="3" x2="12" y2="15" stroke="currentColor" fill="none"/>
                </svg>
                <div class="nav-label">Загрузка</div>
                <div class="nav-desc">тестовые данные и точности</div>
            </div>
        </div>

        <!-- Информация об авторах (маленькая подпись) -->
        <div class="footer-info">           
            Горин Д В, Гусев М А
        </div>
    </div>

    <script>
        (function() {
            const themeToggle = document.getElementById('themeToggle');
            const themeText = document.getElementById('themeText');
            const body = document.body;

            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                body.classList.add('dark-theme');
                themeText.innerText = 'Тёмная';
            } else {
                themeText.innerText = 'Светлая';
            }

            function switchTheme() {
                if (body.classList.contains('dark-theme')) {
                    body.classList.remove('dark-theme');
                    themeText.innerText = 'Светлая';
                    localStorage.setItem('theme', 'light');
                } else {
                    body.classList.add('dark-theme');
                    themeText.innerText = 'Тёмная';
                    localStorage.setItem('theme', 'dark');
                }
            }

            themeToggle.addEventListener('click', switchTheme);
        })();
    </script>
</body>
</html>
