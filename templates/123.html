<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузите звуковой файл</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .upload-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            margin-bottom: 0.5rem;
            color: #333;
        }
        p {
            color: #666;
            margin-bottom: 1.5rem;
        }
        input[type="file"] {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 1rem;
            border: 2px dashed #ccc;
            border-radius: 8px;
            background: #fafafa;
            cursor: pointer;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="upload-card">
        <h1>Загрузите аудиофайл</h1>
        <p>Поддерживаются форматы MP3, WAV, OGG и другие</p>

        <form method="post" enctype="multipart/form-data" action="{% url 'upload_audio' %}">
            {% csrf_token %}
            <input type="file" name="audio_file" accept="audio/*" required>
            <button type="submit">Отправить</button>
        </form>
    </div>
</body>
</html>
